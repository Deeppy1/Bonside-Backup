<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bonside – General</title>

<style>
* {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    background: url("/background.jpg") no-repeat center center fixed;
    background-size: cover;
    color: #fff;
}

.overlay {
    background: rgba(0, 0, 0, 0.65);
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card {
    width: 420px;
    padding: 30px;
    background: rgba(20, 20, 20, 0.85);
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    text-align: center;
}

h1 {
    margin: 0 0 10px;
    font-size: 28px;
}

.subtitle {
    opacity: 0.7;
    margin-bottom: 25px;
}

.stat {
    margin: 12px 0;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
}

.buttons {
    margin-top: 25px;
    display: flex;
    gap: 12px;
}

button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #2c7be5;
    color: #fff;
    font-size: 15px;
    cursor: pointer;
}

button.secondary {
    background: #444;
}

button:hover {
    opacity: 0.85;
}
</style>
</head>

<body>
<div class="overlay">
    <div class="card">
        <h1>Bonside</h1>
        <div class="subtitle">General Dashboard</div>

        <div class="stat">
            <span>Current Time</span>
            <span id="time">--:--:--</span>
        </div>

        <div class="stat">
            <span>Admin Console</span>
            <span style="color:#4ade80;">Available</span>
        </div>

        <div class="stat">
            <span>PVE Node</span>
            <span style="color:#facc15;">Local Network</span>
        </div>

        <div class="buttons">
            <button onclick="location.href='/admin'">Admin Console</button>
            <button onclick="location.href='/'">Home</button>
        </div>
    </div>
</div>

<script>
function updateTime() {
    const now = new Date();
    document.getElementById("time").textContent =
        now.toLocaleTimeString();
}
updateTime();
setInterval(updateTime, 1000);
</script>

</body>
</html>
