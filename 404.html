<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta charset="UTF-8" />
  <title>404 | Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      height: 100vh;
      background:
        linear-gradient(rgba(10, 20, 30, 0.55), rgba(10, 20, 30, 0.55)),
        url("/background.jpg") center / cover no-repeat fixed;
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    header {
      backdrop-filter: blur(8px);
      background: rgba(15, 25, 35, 0.55);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.4px;
    }

    nav {
      display: flex;
      gap: 12px;
    }

    nav a {
      text-decoration: none;
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      transition: all 0.2s ease;
      font-size: 0.95rem;
    }

    nav a:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-1px);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .error-box {
      background: rgba(15, 25, 35, 0.55);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 42px 50px;
      max-width: 520px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .error-box h2 {
      font-size: 3rem;
      margin-bottom: 10px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .error-box h3 {
      font-size: 1.4rem;
      margin-bottom: 14px;
      font-weight: 500;
      opacity: 0.95;
    }

    .error-box p {
      opacity: 0.85;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .error-box a {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      padding: 10px 22px;
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.2s ease;
      font-size: 0.95rem;
    }

    .error-box a:hover {
      background: rgba(255,255,255,0.22);
      transform: translateY(-1px);
    }

    footer {
      text-align: center;
      padding: 12px;
      font-size: 0.8rem;
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <header>
    <h1>Bonside</h1>
    <nav>
      <a href="/general">General</a>
      <a href="/admin">Admin Console</a>
      <a href="/kb">Knowledge Base</a>
    </nav>
  </header>

  <main>
    <div class="error-box">
      <h2>404</h2>
      <h3>Page not found</h3>
      <p>
        The page you were looking for doesn’t exist, or it’s been moved.
      </p>
      <a href="/">Return home</a>
    </div>
  </main>

  <footer>
    © Bonside
  </footer>
</body>
</html>
